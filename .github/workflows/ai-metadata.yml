name: Generate AI blog metadata

on:
  push:
    paths:
      - "src/content/blog/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate metadata
        run: npm run metadata
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.2' }}

      - name: Commit generated metadata
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Generate AI metadata for blog posts"
          file_pattern: "src/content/blog/*.md src/content/blog/**/*.md"
